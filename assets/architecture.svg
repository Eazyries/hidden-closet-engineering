<svg viewBox="0 0 900 1300" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4b5563"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="900" height="1300" fill="#0f172a"/>

  <text x="450" y="45" text-anchor="middle" font-size="24" font-weight="700" fill="#f8fafc">Hidden Closet — AI Catalog Pipeline</text>
  <text x="450" y="72" text-anchor="middle" font-size="14" fill="#94a3b8">Every stage below exists to reduce the risk of publishing a product under the wrong brand</text>

  <!-- 1 Supplier -->
  <rect x="300" y="110" width="300" height="70" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="450" y="138" text-anchor="middle" font-size="15" font-weight="700" fill="#f1f5f9">Supplier Feed</text>
  <text x="450" y="158" text-anchor="middle" font-size="12" fill="#94a3b8">Multi-source (Supplier A / Supplier B)</text>

  <line x1="450" y1="180" x2="450" y2="210" stroke="#4b5563" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 2 Title Parser -->
  <rect x="270" y="210" width="360" height="76" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="450" y="236" text-anchor="middle" font-size="15" font-weight="700" fill="#f1f5f9">Title Parser</text>
  <text x="450" y="256" text-anchor="middle" font-size="12" fill="#94a3b8">Deterministic title parsing module</text>
  <text x="450" y="274" text-anchor="middle" font-size="11" fill="#64748b">cleaned_title · model_code · size · forbidden_tokens</text>

  <line x1="450" y1="286" x2="450" y2="316" stroke="#4b5563" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 3 Brand Resolver -->
  <rect x="270" y="316" width="360" height="76" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="450" y="342" text-anchor="middle" font-size="15" font-weight="700" fill="#f1f5f9">Brand Resolver</text>
  <text x="450" y="362" text-anchor="middle" font-size="12" fill="#94a3b8">Brand resolution module</text>
  <text x="450" y="380" text-anchor="middle" font-size="11" fill="#64748b">DB brand wins over tags · factory-coded tags never leak as a real brand</text>

  <line x1="450" y1="392" x2="450" y2="422" stroke="#4b5563" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 4 Routing -->
  <rect x="270" y="422" width="360" height="76" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="450" y="448" text-anchor="middle" font-size="15" font-weight="700" fill="#f1f5f9">Routing + Payload Sanitation</text>
  <text x="450" y="468" text-anchor="middle" font-size="12" fill="#94a3b8">Route decision + safe payload builder</text>
  <text x="450" y="486" text-anchor="middle" font-size="11" fill="#64748b">Skips the AI call entirely when forbidden tokens are present</text>

  <line x1="450" y1="498" x2="450" y2="528" stroke="#4b5563" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 5 OpenAI -->
  <rect x="270" y="528" width="360" height="76" rx="10" fill="#1e3a5f" stroke="#2563eb" stroke-width="1.5"/>
  <text x="450" y="554" text-anchor="middle" font-size="15" font-weight="700" fill="#f1f5f9">OpenAI Analysis</text>
  <text x="450" y="574" text-anchor="middle" font-size="12" fill="#93c5fd">Caption generation call</text>
  <text x="450" y="592" text-anchor="middle" font-size="11" fill="#64748b">Receives a pre-sanitized payload only — forbidden tokens excluded</text>

  <line x1="450" y1="604" x2="450" y2="634" stroke="#4b5563" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 6 Output Validation -->
  <rect x="240" y="634" width="420" height="92" rx="10" fill="#3b1e1e" stroke="#dc2626" stroke-width="1.5"/>
  <text x="450" y="660" text-anchor="middle" font-size="15" font-weight="700" fill="#fecaca">Output Validation</text>
  <text x="450" y="680" text-anchor="middle" font-size="12" fill="#fca5a5">Validation module</text>
  <text x="450" y="698" text-anchor="middle" font-size="11" fill="#94a3b8">Rejects invented model names, forbidden tokens, brand mismatch</text>
  <text x="450" y="714" text-anchor="middle" font-size="11" fill="#94a3b8">Fails → deterministic safe fallback caption</text>

  <line x1="450" y1="726" x2="450" y2="756" stroke="#4b5563" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 7 Publish Queue -->
  <rect x="270" y="756" width="360" height="76" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="450" y="782" text-anchor="middle" font-size="15" font-weight="700" fill="#f1f5f9">Publish Queue</text>
  <text x="450" y="802" text-anchor="middle" font-size="12" fill="#94a3b8">Queue management module</text>
  <text x="450" y="820" text-anchor="middle" font-size="11" fill="#64748b">Composite key per product · queued → published lifecycle</text>

  <line x1="450" y1="832" x2="450" y2="862" stroke="#4b5563" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 8 Telegram -->
  <rect x="300" y="862" width="300" height="70" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="450" y="890" text-anchor="middle" font-size="15" font-weight="700" fill="#f1f5f9">Telegram Channel</text>
  <text x="450" y="912" text-anchor="middle" font-size="12" fill="#94a3b8">Last step — delivery, not the center of the system</text>

  <!-- Side annotation: safety layer bracket -->
  <rect x="60" y="210" width="150" height="500" rx="10" fill="none" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="6,5"/>
  <text x="135" y="200" text-anchor="middle" font-size="13" font-weight="700" fill="#fbbf24">Safety layer</text>
  <text x="135" y="440" text-anchor="middle" font-size="11" fill="#fbbf24" transform="rotate(-90 135 440)">5 independent controls before publish</text>

  <!-- Bottom: incident + harness callouts -->
  <rect x="60" y="960" width="780" height="150" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="450" y="990" text-anchor="middle" font-size="14" font-weight="700" fill="#f1f5f9">Proven under a real incident</text>
  <text x="450" y="1015" text-anchor="middle" font-size="12" fill="#94a3b8">Incident #475302 — OCR noise + an internal tag leaked into a public caption</text>
  <text x="450" y="1035" text-anchor="middle" font-size="12" fill="#94a3b8">Root-caused to two independent bugs, fixed in 4 layers, locked in with a regression fixture</text>
  <text x="450" y="1060" text-anchor="middle" font-size="12" fill="#94a3b8">The test harness itself was later found to conflate "safety" and "style" failures —</text>
  <text x="450" y="1080" text-anchor="middle" font-size="12" fill="#94a3b8">split into a hard safety gate (must be zero) and a separate style/quality gate</text>
  <text x="450" y="1100" text-anchor="middle" font-size="11" fill="#64748b">Full write-up: docs/ENGINEERING_CASE_STUDY.md</text>

  <text x="450" y="1250" text-anchor="middle" font-size="11" fill="#475569">Diagram reflects the verified pipeline architecture of the production system</text>
</svg>
